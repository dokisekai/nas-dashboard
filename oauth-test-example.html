<!DOCTYPE html>
<html>
<head>
    <title>OAuth 登录测试</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .btn { background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .info { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 20px 0; }
        code { background: #fff; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>OAuth/OIDC 登录测试</h1>

    <div class="info">
        <h3>当前配置：</h3>
        <p>Client ID: <code>client-d56UMow9IjKknOnj</code></p>
        <p>Client Secret: <code>im0a7SggwKjCplNdGY6zjuLhGOKeXWBC</code></p>
        <p>回调地址: <code>http://localhost:3000/callback</code></p>
    </div>

    <button class="btn" onclick="login()">使用NAS账号登录</button>

    <div id="result" style="margin-top: 20px;"></div>

    <script>
        const CLIENT_ID = 'client-d56UMow9IjKknOnj';
        const REDIRECT_URI = 'http://localhost:3000/callback';
        const AUTH_URL = 'https://192.168.50.10:8888/sso/authorize';
        const SCOPE = 'openid profile email';

        function login() {
            const state = Math.random().toString(36).substring(7);
            sessionStorage.setItem('oauth_state', state);

            const authUrl = `${AUTH_URL}?` +
                `client_id=${CLIENT_ID}&` +
                `response_type=code&` +
                `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                `scope=${encodeURIComponent(SCOPE)}&` +
                `state=${state}`;

            window.location.href = authUrl;
        }

        // 处理回调
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        if (code) {
            document.getElementById('result').innerHTML = `
                <div class="info">
                    <h3>授权成功！</h3>
                    <p>授权码: <code>${code}</code></p>
                    <p>状态: <code>${state}</code></p>
                    <p>下一步：使用授权码换取访问令牌</p>
                </div>
            `;
        }
    </script>
</body>
</html>
