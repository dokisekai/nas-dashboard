<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immich安全登录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .login-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 450px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { margin: 0; opacity: 0.9; font-size: 14px; }
        .step { margin: 8px 0; font-size: 13px; opacity: 0.8; }
        .error { color: #f87171; margin-top: 15px; font-size: 14px; }
        .success { color: #4ade80; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="spinner"></div>
        <h1 id="status">NAS Dashboard 安全访问</h1>
        <p id="message">正在准备Immich安全登录</p>
        <div id="steps"></div>
        <div id="result"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const message = document.getElementById('message');
        const steps = document.getElementById('steps');
        const result = document.getElementById('result');

        async function setupAutoLogin() {
            try {
                // 步骤1: 检查NAS Dashboard认证状态
                addStep('检查NAS Dashboard登录状态...');
                
                // 从localStorage获取JWT token
                const token = localStorage.getItem('token') ||
                             sessionStorage.getItem('token');
                
                if (!token) {
                    throw new Error('未找到NAS Dashboard登录凭证');
                }
                
                addStep('✅ NAS Dashboard认证有效');
                
                // 步骤2: 通过认证API获取Immich凭证
                addStep('请求Immich访问凭证...');
                status.textContent = '正在获取安全凭证...';
                
                const response = await fetch('/api/immich/auth-login', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success && data.apiKey && data.immichUrl) {
                    // 步骤3: 安全存储API密钥
                    addStep('✅ 凭证获取成功');
                    addStep('设置安全存储...');
                    
                    sessionStorage.setItem('immich_api_key', data.apiKey);
                    sessionStorage.setItem('immich_url', data.immichUrl);
                    
                    // 步骤4: 准备跳转
                    status.textContent = '✅ 准备完成';
                    message.textContent = '正在跳转到Immich...';
                    result.innerHTML = '<div class="success">通过NAS Dashboard安全认证访问</div>';
                    
                    setTimeout(() => {
                        window.location.href = data.immichUrl;
                    }, 2000);
                } else {
                    throw new Error('无效的凭证响应');
                }
                
            } catch (error) {
                console.error('自动登录失败:', error);
                status.textContent = '❌ 安全登录失败';
                message.textContent = error.message;
                result.innerHTML = '<div class="error">请确保已登录NAS Dashboard</div>';
                
                // 失败后跳转到登录页面
                setTimeout(() => {
                    window.location.href = '/login';
                }, 3000);
            }
        }
        
        function addStep(text) {
            const step = document.createElement('div');
            step.className = 'step';
            step.textContent = text;
            steps.appendChild(step);
        }

        // 页面加载时启动
        setupAutoLogin();
    </script>
</body>
</html>
