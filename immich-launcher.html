<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immich快速启动 - NAS Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin: 0 0 30px 0;
            font-size: 16px;
        }
        
        .user-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .user-info p {
            margin: 5px 0;
            color: #333;
        }
        
        .launch-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 10px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .refresh-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📷</div>
        <h1>Immich 照片管理</h1>
        <p class="subtitle">NAS Dashboard 集成服务</p>
        
        <div id="status" class="status">
            <div class="loading"></div> 正在检查连接...
        </div>
        
        <div id="userInfo" class="user-info" style="display: none;">
            <p><strong>当前用户:</strong> <span id="userName">-</span></p>
            <p><strong>邮箱:</strong> <span id="userEmail">-</span></p>
        </div>
        
        <button class="launch-btn" onclick="launchImmich()">
            🚀 打开 Immich 管理界面
        </button>
        
        <button class="refresh-btn" onclick="checkStatus()">
            🔄 检查状态
        </button>
    </div>

    <script>
        const IMMICH_URL = 'http://localhost:2283';
        const API_KEY = 't5nmlDaFlyz7guxpfmAwvOeiKp7zEC7loF2Ow15V8Q';

        function checkStatus() {
            const statusDiv = document.getElementById('status');
            const userInfoDiv = document.getElementById('userInfo');
            
            statusDiv.className = 'status';
            statusDiv.innerHTML = '<div class="loading"></div> 正在检查连接...';
            
            fetch(IMMICH_URL + '/api/users', {
                headers: {
                    'X-API-Key': API_KEY
                }
            })
            .then(response => response.json())
            .then(data => {
                statusDiv.className = 'status online';
                statusDiv.innerHTML = '✅ Immich服务在线';
                
                if (data && data.length > 0) {
                    const user = data[0];
                    document.getElementById('userName').textContent = user.name || '未知';
                    document.getElementById('userEmail').textContent = user.email || '未知';
                    userInfoDiv.style.display = 'block';
                }
            })
            .catch(error => {
                statusDiv.className = 'status offline';
                statusDiv.innerHTML = '❌ Immich服务离线';
                userInfoDiv.style.display = 'none';
            });
        }

        function launchImmich() {
            // 直接打开Immich，配置的API密钥会支持自动登录
            window.open(IMMICH_URL, '_blank');
        }

        // 页面加载时自动检查状态
        window.onload = function() {
            checkStatus();
            // 每30秒自动检查状态
            setInterval(checkStatus, 30000);
        };
    </script>
</body>
</html>
