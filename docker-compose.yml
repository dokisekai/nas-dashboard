services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nas-backend
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # 只读挂载主机根文件系统，让备份/恢复任务能访问任意主机目录
      # （在 BackupManager 中用 /host/<path> 引用主机路径）
      - /:/host:ro
      # 数据库 / 配置 / rclone.conf 持久化目录（可写）
      # 设置页保存的 WebDAV 凭据会写到 /data/rclone.conf
      - ./data:/data
      # restic 缓存目录
      - restic-cache:/data/restic-cache
      # 恢复目标目录（默认恢复到主机 /var/restic-restore）
      - /var/restic-restore:/restore
      # docker socket —— 读写挂载，用于应用管理中心启停容器
      - /var/run/docker.sock:/var/run/docker.sock
      # 时区
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GIN_MODE=release
      - DB_DRIVER=sqlite
      - DB_PATH=/data/nas-dashboard.db
      - TZ=Asia/Shanghai
      # 占位符 ${RESTIC_PASSWORD} 的值（被 backend/config/backup-seed.json 引用）
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-}
      - RCLONE_CONFIG=/data/rclone.conf
    networks:
      - nas-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nas-frontend
    restart: unless-stopped
    ports:
      # 主机 3000 已被其他服务占用，改用 3001；如需修改自行调整
      - "3001:80"
    depends_on:
      - backend
    networks:
      - nas-network

networks:
  nas-network:
    driver: bridge

volumes:
  restic-cache:
