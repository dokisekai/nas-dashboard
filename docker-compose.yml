version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nas-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 挂载系统目录以获取真实数据
      - /:/host:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GIN_MODE=release
    networks:
      - nas-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nas-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nas-network

networks:
  nas-network:
    driver: bridge
